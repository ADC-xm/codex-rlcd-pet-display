<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Codex RLCD Fluffy Dog V3</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: #dfe6e1;
    color: #111;
    font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
  }
  .layout {
    width: min(1040px, 96vw);
    display: grid;
    grid-template-columns: 1fr 230px;
    gap: 18px;
    align-items: start;
  }
  .screen {
    width: 100%;
    aspect-ratio: 4 / 3;
    border: 8px solid #111;
    background: #eef3ef;
    box-shadow: 0 12px 30px rgba(0,0,0,.2);
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
  }
  .panel {
    background: #fff;
    border: 1px solid #bfc8c0;
    padding: 12px;
  }
  h1 { margin: 0 0 8px; font-size: 18px; }
  p { margin: 0 0 12px; color: #59625c; font-size: 13px; line-height: 1.5; }
  button {
    width: 100%;
    min-height: 38px;
    margin-bottom: 7px;
    border: 1px solid #111;
    background: #fff;
    text-align: left;
    padding: 7px 9px;
    font: inherit;
    cursor: pointer;
  }
  button.active { background: #111; color: #fff; }
  @media (max-width: 820px) { .layout { grid-template-columns: 1fr; } }
</style>
</head>
<body>
  <main class="layout">
    <section class="screen">
      <canvas id="screen" width="400" height="300"></canvas>
    </section>
    <aside class="panel">
      <h1>毛茸茸小狗 V3</h1>
      <p>学习你图里的“白团小狗”感觉：大轮廓、粗黑线、短耳朵、点眼睛、小舌头。这里是黑白屏适配版。</p>
      <div id="buttons"></div>
    </aside>
  </main>

<script>
const canvas = document.getElementById("screen");
const ctx = canvas.getContext("2d");
const moods = [
  ["energetic", 8],
  ["normal", 25],
  ["tired", 55],
  ["exhausted", 80],
  ["dying", 95],
];
let moodIndex = 1;
let last = 0;
let frame = 0;
let dogX = 160;
let dir = 1;

function clear() {
  ctx.fillStyle = "#eef3ef";
  ctx.fillRect(0, 0, 400, 300);
  ctx.strokeStyle = "#111";
  ctx.fillStyle = "#111";
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
}

function text(s, x, y, size = 12, bold = false, white = false) {
  ctx.fillStyle = white ? "#eef3ef" : "#111";
  ctx.font = `${bold ? "700 " : ""}${size}px Segoe UI, Arial`;
  ctx.fillText(s, x, y);
}

function line(x1, y1, x2, y2, w = 4) {
  ctx.lineWidth = w;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
}

function path(points, w = 4, close = false) {
  ctx.lineWidth = w;
  ctx.beginPath();
  ctx.moveTo(points[0][0], points[0][1]);
  for (let i = 1; i < points.length; i++) {
    const p = points[i];
    if (p.length === 2) ctx.lineTo(p[0], p[1]);
    else ctx.quadraticCurveTo(p[0], p[1], p[2], p[3]);
  }
  if (close) ctx.closePath();
  ctx.stroke();
}

function circle(x, y, r, fill = false, w = 4) {
  ctx.lineWidth = w;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  if (fill) ctx.fill(); else ctx.stroke();
}

function drawPage(ts) {
  clear();
  ctx.fillStyle = "#111";
  ctx.fillRect(0, 0, 400, 46);
  ctx.strokeRect(0, 0, 400, 300);
  text("CODEX BLE", 16, 32, 24, true, true);
  text("BLE: connected  Codex: running", 190, 22, 12, false, true);
  text("07-08 11:06:32  Plan: pro", 190, 39, 10, false, true);
  text("Room 25.1C  54%RH", 24, 68, 16, true);

  const [mood, used] = moods[moodIndex];
  drawFluffyDog(dogX, 94, mood);
  text(`pet: ${mood}`, 286, 76, 11);

  text("5h remaining", 24, 128, 16, true);
  text(`${100 - used}%`, 24, 166, 38, true);
  ctx.strokeRect(24, 180, 160, 22);
  ctx.fillRect(26, 182, (156 * (100 - used)) / 100, 18);
  text(`used ${used}%  reset 14:30`, 24, 224, 11);
  line(200, 96, 200, 258, 2);
  text("7d remaining", 224, 128, 16, true);
  text("71%", 224, 166, 38, true);
  ctx.strokeRect(224, 180, 150, 22);
  ctx.fillRect(226, 182, 106, 18);
  text("used 29%  reset 07-14", 224, 224, 11);
  text("Updated from PC via BLE.", 16, 286, 11);
  text("BAT 82%", 306, 286, 12);
}

function drawFace(cx, cy, mood) {
  const blink = frame % 7 === 0 || mood === "tired";
  if (mood === "dying") {
    line(cx - 9, cy - 5, cx - 2, cy + 2, 3);
    line(cx - 2, cy - 5, cx - 9, cy + 2, 3);
    line(cx + 14, cy - 5, cx + 21, cy + 2, 3);
    line(cx + 21, cy - 5, cx + 14, cy + 2, 3);
  } else if (blink) {
    line(cx - 10, cy - 4, cx - 2, cy - 4, 3);
    line(cx + 14, cy - 4, cx + 22, cy - 4, 3);
  } else {
    circle(cx - 6, cy - 5, 3, true);
    circle(cx + 18, cy - 5, 3, true);
  }
  circle(cx + 6, cy + 1, 4, true);
  line(cx + 6, cy + 5, cx + 1, cy + 10, 3);
  line(cx + 6, cy + 5, cx + 14, cy + 10, 3);
  if (mood === "energetic" || mood === "normal") {
    path([[cx + 5, cy + 11], [cx + 9, cy + 19], [cx + 14, cy + 11]], 3);
  }
}

function drawFluffyDog(cx, cy, mood) {
  const walk = frame % 4;
  let bob = walk % 2 ? -2 : 0;
  let paw = walk % 2 ? -7 : 0;
  let tail = walk % 2 ? -8 : 8;
  if (mood === "energetic") { bob -= 4; paw -= 5; tail *= 2; }
  if (mood === "tired") { bob += 4; paw = 0; tail = 2; }

  if (mood === "dying") {
    cy += 28;
    path([
      [cx - 70, cy + 5], [cx - 52, cy - 18, cx - 20, cy - 14],
      [cx + 8, cy - 27, cx + 54, cy - 14],
      [cx + 78, cy - 4, cx + 68, cy + 20],
      [cx + 28, cy + 34, cx - 38, cy + 26],
      [cx - 76, cy + 23, cx - 70, cy + 5]
    ], 5);
    drawFace(cx + 20, cy - 2, mood);
    line(cx - 68, cy + 2, cx - 88, cy - 8, 5);
    text("zzz", cx - 10, cy - 34, 12);
    return;
  }

  if (mood === "exhausted") {
    cy += 15;
    paw = 0;
    tail = 0;
  }

  cy += bob;

  // fluffy outline: ears, body and paws as one soft sticker-like shape.
  path([
    [cx - 76, cy - 16],
    [cx - 89, cy - 38, cx - 58, cy - 48],
    [cx - 34, cy - 53, cx - 19, cy - 37],
    [cx - 6, cy - 60, cx + 32, cy - 56],
    [cx + 50, cy - 57, cx + 58, cy - 38],
    [cx + 82, cy - 48, cx + 91, cy - 24],
    [cx + 96, cy - 4, cx + 75, cy + 5],
    [cx + 82, cy + 29, cx + 51, cy + 40],
    [cx + 29, cy + 49, cx + 5, cy + 35],
    [cx - 15, cy + 52, cx - 40, cy + 42],
    [cx - 64, cy + 38, cx - 54, cy + 13],
    [cx - 86, cy + 4, cx - 76, cy - 16],
  ], 5);

  // little fluffy notches.
  line(cx - 36, cy - 50, cx - 27, cy - 42, 3);
  line(cx + 41, cy - 50, cx + 33, cy - 41, 3);
  line(cx - 72, cy + 6, cx - 84, cy + 20, 4);
  line(cx + 74, cy + 5, cx + 90, cy + 16, 4);

  drawFace(cx, cy - 13, mood);

  // paws.
  if (mood === "exhausted") {
    line(cx - 26, cy + 15, cx - 10, cy + 25, 5);
    line(cx + 32, cy + 16, cx + 47, cy + 24, 5);
    text("...", cx + 68, cy - 28, 12);
  } else {
    line(cx - 29, cy + 12, cx - 38, cy + 30 + paw, 5);
    line(cx + 34, cy + 11, cx + 47, cy + 28 - paw, 5);
    if (mood === "energetic") {
      line(cx - 101, cy + 30, cx - 82, cy + 30, 3);
      line(cx - 94, cy + 40, cx - 76, cy + 40, 3);
    }
  }

  // tail.
  path([
    [cx - 76, cy + 8],
    [cx - 103, cy - 7 + tail, cx - 91, cy - 33 + tail],
    [cx - 74, cy - 20 + tail, cx - 86, cy - 7 + tail]
  ], 5);
}

function tick(ts) {
  if (ts - last > 900) {
    last = ts;
    frame += 1;
    const mood = moods[moodIndex][0];
    const step = mood === "energetic" ? 16 : mood === "normal" ? 9 : mood === "tired" ? 4 : mood === "exhausted" ? 1 : 0;
    dogX += dir * step;
    if (dogX > 280) { dogX = 280; dir = -1; }
    if (dogX < 126) { dogX = 126; dir = 1; }
  }
  drawPage(ts);
  requestAnimationFrame(tick);
}

const buttons = document.getElementById("buttons");
moods.forEach(([mood], index) => {
  const b = document.createElement("button");
  b.textContent = `${index + 1}. ${mood}`;
  b.onclick = () => {
    moodIndex = index;
    [...buttons.children].forEach(x => x.classList.remove("active"));
    b.classList.add("active");
  };
  if (index === moodIndex) b.classList.add("active");
  buttons.appendChild(b);
});
requestAnimationFrame(tick);
</script>
</body>
</html>
