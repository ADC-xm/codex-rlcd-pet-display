<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Codex RLCD Mood Dog V2</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: #dfe6e1;
    font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    color: #111;
  }
  .layout {
    width: min(1040px, 96vw);
    display: grid;
    grid-template-columns: 1fr 230px;
    gap: 18px;
    align-items: start;
  }
  .screen {
    width: 100%;
    aspect-ratio: 4 / 3;
    border: 8px solid #111;
    background: #eef3ef;
    box-shadow: 0 12px 30px rgba(0,0,0,.2);
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
  }
  .panel {
    background: #fff;
    border: 1px solid #bfc8c0;
    padding: 12px;
  }
  h1 {
    margin: 0 0 8px;
    font-size: 18px;
  }
  p {
    margin: 0 0 12px;
    color: #59625c;
    font-size: 13px;
    line-height: 1.5;
  }
  button {
    width: 100%;
    min-height: 38px;
    margin-bottom: 7px;
    border: 1px solid #111;
    background: #fff;
    text-align: left;
    padding: 7px 9px;
    font: inherit;
    cursor: pointer;
  }
  button.active {
    background: #111;
    color: #fff;
  }
  @media (max-width: 820px) {
    .layout { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <main class="layout">
    <section class="screen">
      <canvas id="screen" width="400" height="300"></canvas>
    </section>
    <aside class="panel">
      <h1>线条小狗 V2</h1>
      <p>更大、更粗、更像贴纸。切换 mood 看它随 Codex 已用额度变化。</p>
      <div id="buttons"></div>
    </aside>
  </main>

<script>
const canvas = document.getElementById("screen");
const ctx = canvas.getContext("2d");
const moods = [
  ["energetic", 8],
  ["normal", 25],
  ["tired", 55],
  ["exhausted", 80],
  ["dying", 95],
];
let moodIndex = 1;
let last = 0;
let frame = 0;
let dogX = 124;
let dir = 1;

function clear() {
  ctx.fillStyle = "#eef3ef";
  ctx.fillRect(0, 0, 400, 300);
  ctx.strokeStyle = "#111";
  ctx.fillStyle = "#111";
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
}

function text(s, x, y, size = 12, bold = false, white = false) {
  ctx.fillStyle = white ? "#eef3ef" : "#111";
  ctx.font = `${bold ? "700 " : ""}${size}px Segoe UI, Arial`;
  ctx.fillText(s, x, y);
}

function line(x1, y1, x2, y2, w = 3) {
  ctx.lineWidth = w;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
}

function ellipse(x, y, rx, ry, w = 3) {
  ctx.lineWidth = w;
  ctx.beginPath();
  ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
  ctx.stroke();
}

function circle(x, y, r, w = 3, fill = false) {
  ctx.lineWidth = w;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  if (fill) ctx.fill(); else ctx.stroke();
}

function dline(cx, cy, x1, y1, x2, y2, w = 3) {
  line(cx + dir * x1, cy + y1, cx + dir * x2, cy + y2, w);
}

function dcircle(cx, cy, x, y, r, w = 3, fill = false) {
  circle(cx + dir * x, cy + y, r, w, fill);
}

function drawPage(ts) {
  clear();
  ctx.fillStyle = "#111";
  ctx.fillRect(0, 0, 400, 46);
  ctx.strokeRect(0, 0, 400, 300);
  text("CODEX BLE", 16, 32, 24, true, true);
  text("BLE: connected  Codex: running", 190, 22, 12, false, true);
  text("07-08 10:58:32  Plan: pro", 190, 39, 10, false, true);
  text("Room 25.1C  54%RH", 24, 68, 16, true);

  const [mood, used] = moods[moodIndex];
  drawDog(dogX, 92, mood, ts);
  text(`pet: ${mood}`, 286, 76, 11);

  text("5h remaining", 24, 128, 16, true);
  text(`${100 - used}%`, 24, 166, 38, true);
  ctx.strokeRect(24, 180, 160, 22);
  ctx.fillRect(26, 182, (156 * (100 - used)) / 100, 18);
  text(`used ${used}%  reset 14:30`, 24, 224, 11);
  line(200, 96, 200, 258, 2);
  text("7d remaining", 224, 128, 16, true);
  text("71%", 224, 166, 38, true);
  ctx.strokeRect(224, 180, 150, 22);
  ctx.fillRect(226, 182, 106, 18);
  text("used 29%  reset 07-14", 224, 224, 11);
  text("Updated from PC via BLE.", 16, 286, 11);
  text("BAT 82%", 306, 286, 12);
}

function drawDog(cx, cy, mood, ts) {
  const walk = frame % 4;
  let bob = walk % 2 ? -2 : 0;
  let tail = walk % 2 ? -8 : 8;
  const blink = frame % 7 === 0;

  if (mood === "dying") {
    cy += 20;
    ellipse(cx - dir * 8, cy + 5, 54, 18, 4);
    dcircle(cx, cy, 36, -6, 22, 4);
    dline(cx, cy, 25, -22, 9, -34, 4);
    dline(cx, cy, 45, -23, 62, -35, 4);
    dcircle(cx, cy, 28, -10, 3, 0, true);
    dline(cx, cy, 44, -11, 53, -11, 3);
    dline(cx, cy, 35, 2, 44, 2, 3);
    dline(cx, cy, -55, -1, -74, -10, 4);
    dline(cx, cy, -24, 20, -35, 28, 4);
    dline(cx, cy, 3, 21, 14, 28, 4);
    text("zzz", cx - 24, cy - 30, 12);
    return;
  }

  if (mood === "exhausted") {
    cy += 12;
    ellipse(cx - dir * 14, cy + 7, 42, 27, 4);
    dcircle(cx, cy, 28, -12, 26, 4);
    dline(cx, cy, 12, -32, -7, -44, 4);
    dline(cx, cy, 37, -34, 57, -45, 4);
    dline(cx, cy, 19, -16, 30, -16, 3);
    dline(cx, cy, 41, -16, 52, -16, 3);
    dline(cx, cy, 34, -4, 45, -2, 3);
    dline(cx, cy, -51, -3, -71, -8 + tail / 3, 4);
    dline(cx, cy, -25, 30, -18, 39, 4);
    dline(cx, cy, 13, 31, 23, 39, 4);
    text("...", cx + dir * 58 - 10, cy - 34, 12);
    return;
  }

  if (mood === "tired") {
    bob += 4;
    tail /= 2;
  } else if (mood === "energetic") {
    bob -= 5;
    tail *= 2;
  }
  cy += bob;
  ellipse(cx - dir * 17, cy + 7, 46, 28, 4);
  dcircle(cx, cy, 31, -14, 27, 4);
  dline(cx, cy, 12, -34, -8, -47, 4);
  dline(cx, cy, 40, -36, 61, -48, 4);

  if (blink || mood === "tired") {
    dline(cx, cy, 22, -17, 31, -17, 3);
    dline(cx, cy, 44, -17, 53, -17, 3);
  } else {
    dcircle(cx, cy, 26, -18, 3, 0, true);
    dcircle(cx, cy, 47, -18, 3, 0, true);
  }
  dline(cx, cy, 37, -8, 32, -2, 3);
  dline(cx, cy, 37, -8, 45, -2, 3);
  if (mood === "energetic" && frame % 3 === 1) dline(cx, cy, 38, -1, 38, 8, 3);

  const frontLift = walk === 0 || walk === 2 ? -8 : 2;
  const rearLift = walk === 1 || walk === 3 ? -7 : 2;
  dline(cx, cy, 8, 32, 3, 43 + frontLift, 4);
  dline(cx, cy, 31, 29, 38, 42 + rearLift, 4);
  dline(cx, cy, -32, 29, -39, 42 + rearLift, 4);
  dline(cx, cy, -10, 31, -13, 43 + frontLift, 4);
  dline(cx, cy, -58, -2, -82, -15 + tail, 4);

  if (mood === "energetic") {
    dline(cx, cy, -96, 34, -74, 34, 3);
    dline(cx, cy, -88, 43, -66, 43, 3);
  }
}

function tick(ts) {
  if (ts - last > 900) {
    last = ts;
    frame += 1;
    const mood = moods[moodIndex][0];
    const step = mood === "energetic" ? 20 : mood === "normal" ? 12 : mood === "tired" ? 7 : mood === "exhausted" ? 2 : 0;
    dogX += dir * step;
    if (dogX > 298) { dogX = 298; dir = -1; }
    if (dogX < 116) { dogX = 116; dir = 1; }
  }
  drawPage(ts);
  requestAnimationFrame(tick);
}

const buttons = document.getElementById("buttons");
moods.forEach(([mood], index) => {
  const b = document.createElement("button");
  b.textContent = `${index + 1}. ${mood}`;
  b.onclick = () => {
    moodIndex = index;
    [...buttons.children].forEach(x => x.classList.remove("active"));
    b.classList.add("active");
  };
  if (index === moodIndex) b.classList.add("active");
  buttons.appendChild(b);
});
requestAnimationFrame(tick);
</script>
</body>
</html>
